name: Dependency map

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v7
        with:
          path: current

      - name: Checkout base revision
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: before

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0

      - name: Build pdm
        working-directory: current
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Compare dependency maps
        run: node current/dist/cli.js compare before current --format mermaid --output dependency-diff.mmd

      - name: Add dependency diff to job summary
        run: |
          echo '## Dependency map changes' >> "$GITHUB_STEP_SUMMARY"
          echo '```mermaid' >> "$GITHUB_STEP_SUMMARY"
          cat dependency-diff.mmd >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Update dependency diff comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- project-dependency-map -->';
            const diff = require('node:fs').readFileSync('dependency-diff.mmd', 'utf8');
            const body = `${marker}\n## Dependency map changes\n\n\`\`\`mermaid\n${diff}\n\`\`\``;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
